spring.datasource.url=${SMART_COMMERCE_DB_URL:jdbc:mysql://127.0.0.1:3307/smart_commerce?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull}
spring.datasource.username=${SMART_COMMERCE_DB_USERNAME:smart_commerce}
spring.datasource.password=${SMART_COMMERCE_DB_PASSWORD:SmartCommerce@123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

mybatis-plus.configuration.map-underscore-to-camel-case=true
