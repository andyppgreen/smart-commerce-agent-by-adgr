spring.application.name=smart-commerce-admin
server.port=8080
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

app.jwt.secret=${SMART_COMMERCE_JWT_SECRET:smart-commerce-admin-dev-secret}
app.jwt.issuer=smart-commerce-admin
app.jwt.expiration-seconds=86400

app.cache.product-detail-ttl-seconds=${SMART_COMMERCE_PRODUCT_DETAIL_CACHE_TTL_SECONDS:1800}
app.cache.product-null-ttl-seconds=${SMART_COMMERCE_PRODUCT_NULL_CACHE_TTL_SECONDS:60}
app.cache.hot-product-ttl-seconds=${SMART_COMMERCE_HOT_PRODUCT_CACHE_TTL_SECONDS:300}
app.cache.hot-product-limit=${SMART_COMMERCE_HOT_PRODUCT_LIMIT:10}

app.rate-limit.enabled=${SMART_COMMERCE_RATE_LIMIT_ENABLED:true}
app.rate-limit.max-requests=${SMART_COMMERCE_RATE_LIMIT_MAX_REQUESTS:60}
app.rate-limit.window-seconds=${SMART_COMMERCE_RATE_LIMIT_WINDOW_SECONDS:10}

spring.data.redis.repositories.enabled=false
